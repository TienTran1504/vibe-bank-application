server:
  port: 8080

spring:
  application:
    name: gateway

  cloud:
    gateway:
      routes:
        # Auth Service — public endpoints (no JWT required)
        - id: auth-service-public
          uri: http://localhost:8001
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@ipKeyResolver}"

        # User Service
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/users/**

        # Account Service
        - id: account-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/accounts/**

        # Transaction Service
        - id: transaction-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/transactions/**

        # Card Service
        - id: card-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/cards/**

        # Wallet Service
        - id: wallet-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/wallets/**

        # Notification Service
        - id: notification-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/notifications/**

        # Analytics Service
        - id: analytics-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/analytics/**

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:secret}

jwt:
  secret: ${JWT_SECRET:change-me-in-production-must-be-256-bits-long!!}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

logging:
  level:
    com.bankapp: DEBUG
    org.springframework.cloud.gateway: INFO

---
spring:
  config:
    activate:
      on-profile: docker
  data:
    redis:
      host: redis
      password: secret
  cloud:
    gateway:
      routes:
        - id: auth-service-public
          uri: http://auth-service:8001
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@ipKeyResolver}"
        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/v1/users/**
        - id: account-service
          uri: http://account-service:8082
          predicates:
            - Path=/api/v1/accounts/**
        - id: transaction-service
          uri: http://transaction-service:8083
          predicates:
            - Path=/api/v1/transactions/**
        - id: card-service
          uri: http://card-service:8084
          predicates:
            - Path=/api/v1/cards/**
        - id: wallet-service
          uri: http://wallet-service:8086
          predicates:
            - Path=/api/v1/wallets/**
        - id: notification-service
          uri: http://notification-service:8085
          predicates:
            - Path=/api/v1/notifications/**
        - id: analytics-service
          uri: http://analytics-service:8087
          predicates:
            - Path=/api/v1/analytics/**
