spring:
  datasource:
    url: ${TEST_DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth_db}
    driver-class-name: org.postgresql.Driver
    username: ${TEST_DATASOURCE_USERNAME:bankapp}
    password: ${TEST_DATASOURCE_PASSWORD:secret}

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true

  data:
    redis:
      host: ${TEST_REDIS_HOST:localhost}
      port: ${TEST_REDIS_PORT:6379}
      password: ${TEST_REDIS_PASSWORD:secret}

  kafka:
    bootstrap-servers: ${TEST_KAFKA_SERVERS:localhost:9092}

jwt:
  secret: test-secret-must-be-at-least-256-bits-long-for-hmac-sha256!!
  access-expiry-ms: 900000
  refresh-expiry-ms: 604800000
