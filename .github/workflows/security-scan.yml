name: Automated Security Scan

# Runs Anthropic's claude-code-security-review action on every PR.
# Posts findings as PR comments. Uses bank-app-specific custom scan rules.
on:
  pull_request:
    types: [opened, synchronize]
    # Only scan when actual code changes (not docs-only PRs)
    paths:
      - "services/**"
      - "mobile/**"
      - "admin/**"
      - "infra/**"

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - name: Claude Security Review
        uses: anthropics/claude-code-security-review@main
        with:
          claude-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          comment-pr: true
          upload-results: true
          claude-model: claude-opus-4-8
          claudecode-timeout: 25
          custom-security-scan-instructions: .github/custom-security-scan.txt
          false-positive-filtering-instructions: .github/false-positive-filtering.txt
          exclude-directories: |
            .github
            docs
            reference
            audits
            infra/load-tests
            **/__tests__
            **/test
